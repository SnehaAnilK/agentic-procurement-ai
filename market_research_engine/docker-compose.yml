version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — Market Research & Synthesis Engine
#
# Start everything:  docker-compose up --build
# Stop:              docker-compose down
# View logs:         docker-compose logs -f
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Main App (Streamlit Web UI + Cron Scheduler) ──────────────────────────
  app:
    build: .
    container_name: market_research_app
    ports:
      - "8501:8501"         # Streamlit UI → open http://localhost:8501
    env_file:
      - .env                # loads GEMINI_API_KEY, RESEARCH_TOPIC, etc.
    environment:
      - DATABASE_URL=sqlite:///output/research_history.db
    volumes:
      - ./output:/app/output   # output folder is shared with your host machine
                               # so PDFs & the SQLite DB persist between restarts
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

